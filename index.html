<!DOCTYPE html>
<html>
<head>
    <title>LaTeX Live: Anchor-Locked</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { margin: 0; background: #2b2b2b; display: flex; justify-content: center; font-family: sans-serif; }
        #viewer-container { width: 100%; height: 100vh; overflow-y: auto; scroll-behavior: auto; }
        .page-wrapper { margin: 20px auto; box-shadow: 0 0 15px rgba(0,0,0,0.3); background: white; display: block; position: relative; }
        canvas { display: block; max-width: 100%; height: auto; }
        .page-label { position: absolute; top: -25px; left: 0; color: #ccc; font-size: 12px; }
    </style>
</head>
<body>
    <div id="viewer-container"></div>

    <script>
        const url = 'build/default/default.pdf';
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const container = document.getElementById('viewer-container');
        let currentPage = 1;

        // Track which page is currently in view
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
                    currentPage = parseInt(entry.target.dataset.pagenum);
                    window.location.hash = `page=${currentPage}`;
                }
            });
        }, { threshold: 0.5 });

        async function renderPDF() {
            // Read page from Hash if available
            const targetPage = parseInt(window.location.hash.replace('#page=', '')) || currentPage;

            const loadingTask = pdfjsLib.getDocument(`${url}?t=${Date.now()}`);
            const pdfDoc = await loadingTask.promise;

            container.innerHTML = '';

            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({scale: 1.5});

                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper';
                wrapper.dataset.pagenum = i;
                wrapper.id = `p${i}`;
                wrapper.style.width = viewport.width + 'px';
                wrapper.style.height = viewport.height + 'px';

                const canvas = document.createElement('canvas');
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                wrapper.appendChild(canvas);
                container.appendChild(wrapper);
                observer.observe(wrapper);

                // Use non-blocking render
                page.render({canvasContext: canvas.getContext('2d'), viewport: viewport});
            }

            // After DOM is built, jump to the saved page
            const targetEl = document.getElementById(`p${targetPage}`);
            if (targetEl) {
                targetEl.scrollIntoView();
            }
        }

        renderPDF();

        window.addEventListener('load', () => {
            if (window.___browserSync___) {
                window.___browserSync___.socket.on('file:changed', (data) => {
                    if (data.ext === 'pdf') {
                        renderPDF();
                    }
                });
            }
        });
    </script>
</body>
</html>
