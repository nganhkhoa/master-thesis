name: Build and Release PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: "startsWith(github.event.head_commit.message, 'ci:') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run setup script (Fonts, etc.)
        run: |
          chmod +x setup.sh
          ./setup.sh

      - name: Install Tectonic
        uses: wtfjoke/setup-tectonic@v3
        with:
          # Uses the latest stable GitHub release of Tectonic
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build PDF with Tectonic
        run: tectonic -X build

      - name: Determine Release Parameters
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # We are on a tag push (e.g., v1.0)
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "release_name=Release ${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            # We are on a branch push or workflow_dispatch
            SHA_SHORT=$(git rev-parse --short HEAD)
            # Synthesize a tag so GitHub Releases has an anchor
            echo "tag_name=build-${SHA_SHORT}" >> $GITHUB_OUTPUT
            echo "release_name=Draft Build ${SHA_SHORT}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: ${{ steps.vars.outputs.release_name }}
          files: build/default/default.pdf

      - name: Deploy PDF to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        # if: startsWith(github.ref, 'refs/tags/')
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/default
          force_orphan: true
